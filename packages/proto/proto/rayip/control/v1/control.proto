syntax = "proto3";

package rayip.control.v1;

option go_package = "github.com/rayip/rayip/packages/proto/gen/go/rayip/control/v1;controlv1";

service NodeControlService {
  rpc Connect(stream AgentEnvelope) returns (stream ControlEnvelope);
}

message AgentEnvelope {
  string request_id = 1;

  oneof payload {
    AgentHello hello = 10;
    LeaseRenewal lease = 11;
    MetricSnapshot metrics = 12;
    TerminalFrame terminal_frame = 13;
    RuntimeApplyAck runtime_apply_ack = 14;
  }
}

message ControlEnvelope {
  string request_id = 1;

  oneof payload {
    AgentWelcome welcome = 10;
    ControlAck ack = 11;
    ControlPing ping = 12;
    RuntimeApply runtime_apply = 13;
  }
}

message AgentHello {
  string node_code = 1;
  string enrollment_token = 2;
  string agent_version = 3;
  string xray_version = 4;
  string bundle_version = 5;
  repeated string capabilities = 6;
  uint64 sequence = 7;
  int64 lease_ttl_seconds = 8;
  RuntimeObservation runtime = 9;
  NodeProbeObservation probe = 10;
}

message LeaseRenewal {
  string node_id = 1;
  string node_code = 2;
  string session_id = 3;
  string agent_version = 4;
  string xray_version = 5;
  string bundle_version = 6;
  repeated string capabilities = 7;
  uint64 sequence = 8;
  int64 lease_ttl_seconds = 9;
  RuntimeObservation runtime = 10;
  NodeProbeObservation probe = 11;
}

message NodeProbeObservation {
  string public_ip = 1;
  uint32 probe_port = 2;
  repeated string probe_protocols = 3;
  int64 checked_at_unix_milli = 4;
  string scan_host = 5;
  repeated string candidate_public_ips = 6;
}

message MetricSnapshot {
  string node_id = 1;
  double cpu_percent = 2;
  double ram_percent = 3;
  uint64 active_connections = 4;
  uint64 rx_bytes_per_second = 5;
  uint64 tx_bytes_per_second = 6;
}

message TerminalFrame {
  string session_id = 1;
  bytes data = 2;
  bool closed = 3;
}

message AgentWelcome {
  string node_id = 1;
  string session_id = 2;
  int64 lease_ttl_seconds = 3;
  string api_instance_id = 4;
  RuntimeVerdict runtime_verdict = 5;
}

message ControlAck {
  string code = 1;
  string message = 2;
}

message ControlPing {
  int64 unix_milli = 1;
}

message RuntimeObservation {
  string agent_version = 1;
  string xray_version = 2;
  string bundle_version = 3;
  string extension_abi = 4;
  repeated string capabilities = 5;
  string binary_sha256 = 6;
  string manifest_sha256 = 7;
  string runtime_digest = 8;
  uint64 last_good_revision = 9;
}

message RuntimeVerdict {
  RuntimeVerdictStatus status = 1;
  string reason_code = 2;
  string message = 3;
  repeated string required_capabilities = 4;
  string required_extension_abi = 5;
}

enum RuntimeVerdictStatus {
  RUNTIME_VERDICT_STATUS_UNSPECIFIED = 0;
  RUNTIME_VERDICT_STATUS_ACCEPTED = 1;
  RUNTIME_VERDICT_STATUS_NEEDS_UPGRADE = 2;
  RUNTIME_VERDICT_STATUS_QUARANTINED = 3;
  RUNTIME_VERDICT_STATUS_UNSUPPORTED_CAPABILITY = 4;
  RUNTIME_VERDICT_STATUS_DIGEST_MISMATCH = 5;
}

enum RuntimeProtocol {
  RUNTIME_PROTOCOL_UNSPECIFIED = 0;
  RUNTIME_PROTOCOL_SOCKS5 = 1;
  RUNTIME_PROTOCOL_HTTP = 2;
  RUNTIME_PROTOCOL_MIXED = 3;
}

message RuntimeDigest {
  uint64 account_count = 1;
  uint64 enabled_count = 2;
  uint64 disabled_count = 3;
  uint64 max_generation = 4;
  string hash = 5;
}

message RuntimeApply {
  string apply_id = 1;
  string node_id = 2;
  RuntimeApplyMode mode = 3;
  string version_info = 4;
  string nonce = 5;
  uint64 base_revision = 6;
  uint64 target_revision = 7;
  int64 deadline_unix_ms = 8;
  repeated RuntimeResource resources = 9;
  repeated string removed_resource_names = 10;
}

enum RuntimeApplyMode {
  RUNTIME_APPLY_MODE_UNSPECIFIED = 0;
  RUNTIME_APPLY_MODE_DELTA = 1;
  RUNTIME_APPLY_MODE_SNAPSHOT = 2;
}

message RuntimeResource {
  string name = 1;
  RuntimeResourceKind kind = 2;
  uint64 resource_version = 3;
  string runtime_email = 4;
  RuntimeProtocol protocol = 5;
  string listen_ip = 6;
  uint32 port = 7;
  string username = 8;
  string password = 9;
  uint64 egress_limit_bps = 10;
  uint64 ingress_limit_bps = 11;
  uint32 max_connections = 12;
  uint32 priority = 13;
  string abuse_report_policy = 14;
  int64 expires_at_unix_ms = 15;
}

enum RuntimeResourceKind {
  RUNTIME_RESOURCE_KIND_UNSPECIFIED = 0;
  RUNTIME_RESOURCE_KIND_PROXY_ACCOUNT = 1;
}

message RuntimeApplyAck {
  string apply_id = 1;
  string node_id = 2;
  string version_info = 3;
  string nonce = 4;
  RuntimeApplyStatus status = 5;
  uint64 applied_revision = 6;
  uint64 last_good_revision = 7;
  repeated RuntimeResourceResult resource_results = 8;
  RuntimeDigest digest = 9;
  string error_detail = 10;
}

enum RuntimeApplyStatus {
  RUNTIME_APPLY_STATUS_UNSPECIFIED = 0;
  RUNTIME_APPLY_STATUS_ACK = 1;
  RUNTIME_APPLY_STATUS_NACK = 2;
  RUNTIME_APPLY_STATUS_PARTIAL = 3;
}

message RuntimeResourceResult {
  string name = 1;
  RuntimeResourceApplyStatus status = 2;
  string error_detail = 3;
}

enum RuntimeResourceApplyStatus {
  RUNTIME_RESOURCE_APPLY_STATUS_UNSPECIFIED = 0;
  RUNTIME_RESOURCE_APPLY_STATUS_APPLIED = 1;
  RUNTIME_RESOURCE_APPLY_STATUS_REMOVED = 2;
  RUNTIME_RESOURCE_APPLY_STATUS_FAILED = 3;
}
